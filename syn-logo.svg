<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="60%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Orbital rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4f46e5" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="78"  fill="none" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Worker nodes — outer ring (16 workers) -->
  <g filter="url(#glow)">
    <circle cx="456" cy="256" r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="430" cy="357" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="357" cy="430" r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="256" cy="456" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="155" cy="430" r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="82"  cy="357" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="56"  cy="256" r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="82"  cy="155" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="155" cy="82"  r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="256" cy="56"  r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="357" cy="82"  r="5" fill="#7c3aed" opacity="0.9"/>
    <circle cx="430" cy="155" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="406" cy="307" r="3" fill="#6d28d9" opacity="0.6"/>
    <circle cx="106" cy="207" r="3" fill="#6d28d9" opacity="0.6"/>
    <circle cx="307" cy="56"  r="3" fill="#6d28d9" opacity="0.6"/>
    <circle cx="207" cy="456" r="3" fill="#6d28d9" opacity="0.6"/>
  </g>

  <!-- Middle ring nodes (8 workers) -->
  <g filter="url(#glow)">
    <circle cx="416" cy="256" r="4.5" fill="#10b981" opacity="0.85"/>
    <circle cx="369" cy="369" r="4"   fill="#10b981" opacity="0.7"/>
    <circle cx="256" cy="416" r="4.5" fill="#10b981" opacity="0.85"/>
    <circle cx="143" cy="369" r="4"   fill="#10b981" opacity="0.7"/>
    <circle cx="96"  cy="256" r="4.5" fill="#10b981" opacity="0.85"/>
    <circle cx="143" cy="143" r="4"   fill="#10b981" opacity="0.7"/>
    <circle cx="256" cy="96"  r="4.5" fill="#10b981" opacity="0.85"/>
    <circle cx="369" cy="143" r="4"   fill="#10b981" opacity="0.7"/>
  </g>

  <!-- Inner ring nodes (8 workers) -->
  <g filter="url(#glow)">
    <circle cx="374" cy="256" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="338" cy="338" r="3.5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="256" cy="374" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="174" cy="338" r="3.5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="138" cy="256" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="174" cy="174" r="3.5" fill="#f59e0b" opacity="0.7"/>
    <circle cx="256" cy="138" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="338" cy="174" r="3.5" fill="#f59e0b" opacity="0.7"/>
  </g>

  <!-- Connection lines — outer to center (sparse, elegant) -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.15">
    <line x1="456" y1="256" x2="256" y2="256"/>
    <line x1="357" y1="430" x2="256" y2="256"/>
    <line x1="56"  y1="256" x2="256" y2="256"/>
    <line x1="155" y1="82"  x2="256" y2="256"/>
    <line x1="357" y1="82"  x2="256" y2="256"/>
    <line x1="155" y1="430" x2="256" y2="256"/>
  </g>
  <g stroke="#10b981" stroke-width="0.4" opacity="0.12">
    <line x1="416" y1="256" x2="256" y2="256"/>
    <line x1="96"  y1="256" x2="256" y2="256"/>
    <line x1="256" y1="96"  x2="256" y2="256"/>
    <line x1="256" y1="416" x2="256" y2="256"/>
  </g>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="60" fill="url(#core)" opacity="0.6"/>

  <!-- Center node — the Cosmos -->
  <circle cx="256" cy="256" r="28" fill="#0d0d1f" filter="url(#glow2)"/>
  <circle cx="256" cy="256" r="24" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
  <circle cx="256" cy="256" r="18" fill="#1a0a3a"/>
  <circle cx="256" cy="256" r="10" fill="#7c3aed" filter="url(#glow2)"/>
  <circle cx="256" cy="256" r="5"  fill="#e0d7ff"/>

  <!-- SYN text -->
  <text x="256" y="490" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="28" font-weight="700"
    letter-spacing="8"
    fill="#f1f5f9" opacity="0.9">SYN</text>

  <!-- Small stars -->
  <g fill="#f1f5f9" opacity="0.4">
    <circle cx="480" cy="80"  r="1.2"/>
    <circle cx="60"  cy="100" r="1"/>
    <circle cx="440" cy="440" r="1.2"/>
    <circle cx="80"  cy="420" r="1"/>
    <circle cx="300" cy="30"  r="1"/>
    <circle cx="180" cy="490" r="1"/>
    <circle cx="490" cy="320" r="1.2"/>
    <circle cx="20"  cy="320" r="1"/>
  </g>
</svg>
